name: Sovereign Spine — CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Type Check — Zero tolerance for type errors
  # ═══════════════════════════════════════════════════════════════════════════
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Type check all packages
        run: npx turbo run type-check

  # ═══════════════════════════════════════════════════════════════════════════
  # Build — Ensure all packages emit clean artifacts
  # ═══════════════════════════════════════════════════════════════════════════
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: type-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Build all packages
        run: npx turbo run build

      - name: Verify dist/ output exists
        run: |
          test -f packages/identity/dist/index.js || (echo "identity dist missing" && exit 1)
          test -f packages/ledger/dist/index.js || (echo "ledger dist missing" && exit 1)
          test -f packages/compliance/dist/index.js || (echo "compliance dist missing" && exit 1)
          test -f packages/products/dist/index.js || (echo "products dist missing" && exit 1)
          echo "✓ All package artifacts verified"

  # ═══════════════════════════════════════════════════════════════════════════
  # Invariant Tests — The 10 non-negotiable system invariants
  # ═══════════════════════════════════════════════════════════════════════════
  invariants:
    name: Invariant Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Build packages (tests import from dist/)
        run: npx turbo run build --filter='./packages/*'

      - name: Run invariant tests
        run: npx tsx --test packages/identity/__tests__/invariants.test.ts

  # ═══════════════════════════════════════════════════════════════════════════
  # Lint — Code quality enforcement
  # ═══════════════════════════════════════════════════════════════════════════
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Lint
        run: npx turbo run lint
        continue-on-error: true  # Warn-only until codebase is fully cleaned

  # ═══════════════════════════════════════════════════════════════════════════
  # Security — Dependency audit
  # ═══════════════════════════════════════════════════════════════════════════
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high
        continue-on-error: true  # Alert but don't block yet
